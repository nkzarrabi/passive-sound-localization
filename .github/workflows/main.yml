name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.13'

    # Install PortAudio development headers 
    - name: Install PortAudio
      run: sudo apt-get install -y portaudio19-dev

    # Install dependencies with Poetry, including PyAudio
    - name: Install Poetry
      run: curl -sSL https://install.python-poetry.org | python3 -

    - name: Install dependencies
      run: poetry install

    # Run tests with OpenAI API key from secrets
    - name: Run tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # Pass the API key secret
      run: poetry run pytest
